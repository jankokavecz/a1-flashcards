<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Goethe A1 Flashcards</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Cards Screen (default, shown first) -->
        <div id="cards-screen" class="screen active">
            <header class="screen-header">
                <h1>Flashcards</h1>
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <!-- populated by JS -->
                </select>
            </header>
            <div class="cards-content">
                <div class="session-info">
                    <span id="card-counter">1 / 20</span>
                    <div class="session-progress-bar">
                        <div id="session-progress" class="progress-fill"></div>
                    </div>
                </div>
                <div class="card-container">
                    <div class="flashcard" id="flashcard" onclick="flipCard()">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="card-type-badge" id="card-type"></div>
                                <div class="card-level" id="card-level"></div>
                                <div class="card-word" id="card-front-word"></div>
                                <div class="card-hint" id="card-hint">Tap to flip</div>
                            </div>
                            <div class="card-back">
                                <div class="card-translation" id="card-translation"></div>
                                <div class="card-example" id="card-example-de"></div>
                                <div class="card-example-en" id="card-example-en"></div>
                                <div class="card-details" id="card-details"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn btn-learning" onclick="markLearning()">Still Learning</button>
                    <button class="btn btn-known" onclick="markKnown()">Got It ✓</button>
                </div>
            </div>
        </div>

        <!-- Words Screen -->
        <div id="words-screen" class="screen">
            <header class="screen-header">
                <h1>Word List</h1>
                <div class="progress-summary">
                    <span id="words-learned">0</span> / <span id="words-total">643</span> learned
                </div>
            </header>
            <div class="progress-bar-container">
                <div id="words-progress" class="progress-fill"></div>
            </div>
            <div class="words-content" id="word-list">
                <!-- populated by JS -->
            </div>
        </div>

        <!-- Test Screen -->
        <div id="test-screen" class="screen">
            <header class="screen-header">
                <h1>Test</h1>
                <select id="test-category-filter">
                    <option value="all">All Categories</option>
                </select>
            </header>
            <div class="test-content">
                <div id="hands-free-bar" class="hands-free-bar hidden">
                    <span class="hands-free-label">🎤 Hands-free</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="hands-free-toggle">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    </label>
                </div>
                <div class="test-score" id="test-score">
                    <span id="test-correct">0</span> / <span id="test-total">10</span> correct
                </div>
                <div class="test-progress-bar">
                    <div id="test-progress" class="progress-fill"></div>
                </div>
                <div class="test-question" id="test-question">
                    <div class="test-prompt" id="test-prompt"></div>
                    <div class="test-options" id="test-options"></div>
                    <div id="mic-indicator" class="mic-indicator hidden">
                        <div class="mic-pulse"></div>
                        <span class="mic-status">Listening…</span>
                    </div>
                </div>
                <div class="test-result" id="test-result" style="display:none">
                    <div class="test-result-icon" id="test-result-icon"></div>
                    <div class="test-result-score" id="test-result-score"></div>
                    <div class="test-result-message" id="test-result-message"></div>
                    <button class="btn btn-primary" onclick="startTest()">Try Again</button>
                </div>
            </div>
        </div>

        <!-- Scenes Screen -->
        <div id="scenes-screen" class="screen">
            <header class="screen-header">
                <h1>Scenes</h1>
            </header>
            <div class="scenes-content" id="scenes-content">
                <!-- populated by JS -->
            </div>
        </div>

        <!-- Grammar Screen -->
        <div id="grammar-screen" class="screen">
            <header class="screen-header">
                <h1>A1 Grammar</h1>
            </header>
            <div class="grammar-content" id="grammar-content">
                <!-- populated by JS -->
            </div>
        </div>

        <!-- Comics Screen -->
        <div id="comics-screen" class="screen">
            <header class="screen-header">
                <h1>Comics</h1>
            </header>
            <div class="comics-content" id="comics-content">
                <!-- populated by JS -->
            </div>
        </div>

        <!-- Bottom Tab Bar -->
        <nav class="tab-bar">
            <button class="tab active" data-tab="cards" onclick="switchTab('cards')">
                <span class="tab-icon">🃏</span>
                <span class="tab-label">Cards</span>
            </button>
            <button class="tab" data-tab="words" onclick="switchTab('words')">
                <span class="tab-icon">📖</span>
                <span class="tab-label">Words</span>
            </button>
            <button class="tab" data-tab="test" onclick="switchTab('test')">
                <span class="tab-icon">✅</span>
                <span class="tab-label">Test</span>
            </button>
            <button class="tab" data-tab="scenes" onclick="switchTab('scenes')">
                <span class="tab-icon">💬</span>
                <span class="tab-label">Scenes</span>
            </button>
            <button class="tab" data-tab="grammar" onclick="switchTab('grammar')">
                <span class="tab-icon">📐</span>
                <span class="tab-label">Grammar</span>
            </button>
            <button class="tab" data-tab="comics" onclick="switchTab('comics')">
                <span class="tab-icon">💥</span>
                <span class="tab-label">Comics</span>
            </button>
        </nav>
    </div>

    <script src="words.js"></script>
    <script src="grammar.js"></script>
    <script src="scenarios.js"></script>
    <script src="comics.js"></script>
    <script src="app.js"></script>
</body>
</html>
